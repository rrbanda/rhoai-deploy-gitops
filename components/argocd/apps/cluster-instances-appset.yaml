apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-instances
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        revision: main
        directories:
          - path: components/instances/*
          - path: components/instances/rhoai-instance
            exclude: true
  template:
    metadata:
      name: 'instance-{{ .path.basename }}'
      namespace: openshift-gitops
    spec:
      project: platform
      source:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          selfHeal: true
          prune: false
        syncOptions:
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 60s
            maxDuration: 10m0s
            factor: 2
