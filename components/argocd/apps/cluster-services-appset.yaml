apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-services
  namespace: openshift-gitops
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        revision: main
        directories:
          - path: usecases/services/*/profiles/tier1-minimal
  template:
    metadata:
      name: 'service-{{ index .path.segments 2 }}'
      namespace: openshift-gitops
    spec:
      project: usecases
      source:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
      ignoreDifferences:
        - group: serving.kserve.io
          kind: InferenceService
          jsonPointers:
            - /status
            - /metadata/annotations
        - group: serving.kserve.io
          kind: ServingRuntime
          jsonPointers:
            - /status
        - group: route.openshift.io
          kind: Route
          jsonPointers:
            - /spec/host
            - /status
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
            - /stringData
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 10
          backoff:
            duration: 60s
            maxDuration: 10m0s
            factor: 2
