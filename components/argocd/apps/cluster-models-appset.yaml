apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-models
  namespace: openshift-gitops
spec:
  goTemplate: true
  syncPolicy:
    applicationsSync: sync
  generators:
    - git:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        revision: main
        directories:
          - path: usecases/models/*/profiles/tier1-minimal
          # Exclude models not currently deployed (re-enable by removing exclude)
          - path: usecases/models/orchestrator-8b/profiles/tier1-minimal
            exclude: true
          - path: usecases/models/qwen-math-7b/profiles/tier1-minimal
            exclude: true
  template:
    metadata:
      name: 'model-{{ index .path.segments 2 }}'
      namespace: openshift-gitops
    spec:
      project: usecases
      source:
        repoURL: https://github.com/rrbanda/rhoai-deploy-gitops.git
        targetRevision: main
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
      ignoreDifferences:
        - group: serving.kserve.io
          kind: InferenceService
          jsonPointers:
            - /status
            - /metadata/annotations
        - group: serving.kserve.io
          kind: ServingRuntime
          jsonPointers:
            - /status
        - group: route.openshift.io
          kind: Route
          jsonPointers:
            - /spec/host
            - /status
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 10
          backoff:
            duration: 60s
            maxDuration: 10m0s
            factor: 2
