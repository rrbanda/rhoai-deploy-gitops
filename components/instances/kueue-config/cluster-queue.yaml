apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: training-cluster-queue
spec:
  namespaceSelector: {}
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
      flavors:
        - name: gpu-l40s
          resources:
            - name: "cpu"
              nominalQuota: 16
            - name: "memory"
              nominalQuota: "64Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: 1
        - name: gpu-l4
          resources:
            - name: "cpu"
              nominalQuota: 32
            - name: "memory"
              nominalQuota: "128Gi"
            - name: "nvidia.com/gpu"
              nominalQuota: 4
