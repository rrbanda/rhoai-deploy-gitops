apiVersion: v1
kind: ConfigMap
metadata:
  name: genai-toolbox-config
  labels:
    app.kubernetes.io/name: genai-toolbox-config
    app.kubernetes.io/component: config
data:
  tools.yaml: |
    kind: sources
    name: my-pg-source
    type: postgres
    host: postgres.llamastack.svc.cluster.local
    port: 5432
    database: llamastack
    user: ${PG_USER}
    password: ${PG_PASSWORD}
    queryParams:
      sslmode: disable
    ---
    kind: tools
    name: list-tables
    type: postgres-sql
    source: my-pg-source
    description: List all tables in the database.
    statement: "SELECT tablename FROM pg_catalog.pg_tables WHERE schemaname = 'public';"
    ---
    kind: tools
    name: describe-table
    type: postgres-sql
    source: my-pg-source
    description: Describe the columns of a specific table.
    parameters:
      - name: table_name
        type: string
        description: The name of the table to describe.
    statement: >-
      SELECT column_name, data_type, is_nullable
      FROM information_schema.columns
      WHERE table_schema = 'public' AND table_name = $1
      ORDER BY ordinal_position;
    ---
    kind: tools
    name: run-query
    type: postgres-execute-sql
    source: my-pg-source
    description: Execute a SQL query against the database to explore data, count rows, or answer questions.
    ---
    kind: toolsets
    name: database-explorer
    tools:
      - list-tables
      - describe-table
      - run-query
