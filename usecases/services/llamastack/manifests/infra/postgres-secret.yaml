apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app.kubernetes.io/name: llamastack
    app.kubernetes.io/component: database
  annotations:
    description: >-
      PostgreSQL password for the llamastack database.
      After deploy, patch with your chosen password:
        oc patch secret postgres-secret -n llamastack
          -p '{"stringData":{"password":"<your-password>"}}'
      Then restart postgres: oc rollout restart deployment/postgres -n llamastack
type: Opaque
stringData:
  password: CHANGE_ME
