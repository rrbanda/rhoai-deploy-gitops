apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: nomic-embed-text-v1-5
  labels:
    app.kubernetes.io/name: nomic-embed-text-v1-5
    app.kubernetes.io/component: serving-runtime
  annotations:
    opendatahub.io/template-name: vllm-cpu-runtime-template
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cpu-rhel9@sha256:f05e773647dddd37ec6c2215cb14bec87e4ab5a7d37f2e110d16cd92355427d3
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --trust-remote-code
        - --hf-overrides={"matryoshka_dimensions":[768,512,256,128,64]}
        - --max-model-len=2048
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
