apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secret
  labels:
    app.kubernetes.io/name: llamastack
    app.kubernetes.io/component: config
  annotations:
    description: >-
      vLLM connection details for LlamaStack inference.
      After deploy, patch with your values if needed:
        oc patch secret llama-stack-secret -n llamastack
          -p '{"stringData":{"VLLM_URL":"<url>","INFERENCE_MODEL":"<model>"}}'
type: Opaque
stringData:
  INFERENCE_MODEL: gpt-oss-120b
  VLLM_URL: http://gpt-oss-120b-predictor.gpt-oss-120b.svc.cluster.local:8080/v1
  VLLM_TLS_VERIFY: "false"
  VLLM_API_TOKEN: fake
  VLLM_MAX_TOKENS: "4096"
