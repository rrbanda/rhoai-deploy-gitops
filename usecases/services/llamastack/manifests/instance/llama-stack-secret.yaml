apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secret
  labels:
    app.kubernetes.io/name: llamastack
    app.kubernetes.io/component: config
  annotations:
    description: >-
      vLLM connection details for LlamaStack inference and embeddings.
      After deploy, patch with your values if needed:
        oc patch secret llama-stack-secret -n llamastack
          -p '{"stringData":{"VLLM_URL":"<url>","INFERENCE_MODEL":"<model>"}}'
type: Opaque
stringData:
  INFERENCE_MODEL: gpt-oss-120b
  VLLM_URL: https://llama-stack-120b-gpt-oss.apps.rosa.agentic-mcp.jolf.p3.openshiftapps.com/v1/openai/v1
  VLLM_TLS_VERIFY: "false"
  VLLM_API_TOKEN: fake
  VLLM_MAX_TOKENS: "4096"
  EMBEDDING_MODEL: nomic-embed-text-v1-5
  EMBEDDING_PROVIDER_MODEL_ID: nomic-embed-text-v1-5
  VLLM_EMBEDDING_URL: http://nomic-embed-text-v1-5-predictor.llamastack.svc.cluster.local:8080/v1
  VLLM_EMBEDDING_TLS_VERIFY: "false"
  VLLM_EMBEDDING_API_TOKEN: fake
  VLLM_EMBEDDING_MAX_TOKENS: "8192"
