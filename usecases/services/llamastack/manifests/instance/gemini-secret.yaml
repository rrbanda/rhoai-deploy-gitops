apiVersion: v1
kind: Secret
metadata:
  name: gemini-secret
  labels:
    app.kubernetes.io/name: llamastack
    app.kubernetes.io/component: config
  annotations:
    description: >-
      Gemini API key for LlamaStack inference.
      After deploy, patch with your real key:
        oc patch secret gemini-secret -n llamastack
          -p '{"stringData":{"api_key":"<your-gemini-api-key>"}}'
type: Opaque
stringData:
  api_key: CHANGE_ME
