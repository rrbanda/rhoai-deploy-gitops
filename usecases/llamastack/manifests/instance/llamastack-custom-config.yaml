apiVersion: v1
kind: ConfigMap
metadata:
  name: llamastack-custom-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.yaml: |
    version: 2
    distro_name: starter
    apis:
    - agents
    - batches
    - datasetio
    - eval
    - files
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: vllm-inference
        provider_type: remote::vllm
        config:
          base_url: ${env.VLLM_URL}
          max_tokens: ${env.VLLM_MAX_TOKENS:=4096}
          api_token: ${env.VLLM_API_TOKEN:=fake}
          network:
            tls:
              verify: ${env.VLLM_TLS_VERIFY:=true}
      - provider_id: vllm-orchestrator
        provider_type: remote::vllm
        config:
          base_url: http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1
          max_tokens: 4096
          api_token: fake
          network:
            tls:
              verify: false
      - provider_id: ${env.GEMINI_API_KEY:+gemini}
        provider_type: remote::gemini
        config:
          api_key: ${env.GEMINI_API_KEY:=}
      - provider_id: ${env.OPENAI_API_KEY:+openai}
        provider_type: remote::openai
        config:
          api_key: ${env.OPENAI_API_KEY:=}
          base_url: ${env.OPENAI_BASE_URL:=https://api.openai.com/v1}
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
      vector_io:
      - provider_id: faiss
        provider_type: inline::faiss
        config:
          persistence:
            namespace: vector_io::faiss
            backend: kv_default
      - provider_id: ${env.MILVUS_URL:+milvus}
        provider_type: inline::milvus
        config:
          db_path: ${env.MILVUS_DB_PATH:=~/.llama/distributions/starter}/milvus.db
          persistence:
            namespace: vector_io::milvus
            backend: kv_default
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          storage_dir: ${env.FILES_STORAGE_DIR:=~/.llama/distributions/starter/files}
          metadata_store:
            table_name: files_metadata
            backend: sql_default
      safety:
      - provider_id: llama-guard
        provider_type: inline::llama-guard
        config:
          excluded_categories: []
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence:
            agent_state:
              namespace: agents
              backend: kv_default
            responses:
              table_name: responses
              backend: sql_default
              max_write_queue_size: 10000
              num_writers: 4
      eval:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          kvstore:
            namespace: eval
            backend: kv_default
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            namespace: datasetio::huggingface
            backend: kv_default
      - provider_id: localfs
        provider_type: inline::localfs
        config:
          kvstore:
            namespace: datasetio::localfs
            backend: kv_default
      scoring:
      - provider_id: basic
        provider_type: inline::basic
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
      tool_runtime:
      - provider_id: brave-search
        provider_type: remote::brave-search
        config:
          api_key: ${env.BRAVE_SEARCH_API_KEY:=}
          max_results: 3
      - provider_id: tavily-search
        provider_type: remote::tavily-search
        config:
          api_key: ${env.TAVILY_SEARCH_API_KEY:=}
          max_results: 3
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
      batches:
      - provider_id: reference
        provider_type: inline::reference
        config:
          kvstore:
            namespace: batches
            backend: kv_default
    storage:
      backends:
        kv_default:
          type: kv_postgres
          host: ${env.POSTGRES_HOST:=localhost}
          port: ${env.POSTGRES_PORT:=5432}
          db: ${env.POSTGRES_DB:=llamastack}
          user: ${env.POSTGRES_USER:=llamastack}
          password: ${env.POSTGRES_PASSWORD:=llamastack}
          table_name: ${env.POSTGRES_TABLE_NAME:=llamastack_kvstore}
        sql_default:
          type: sql_postgres
          host: ${env.POSTGRES_HOST:=localhost}
          port: ${env.POSTGRES_PORT:=5432}
          db: ${env.POSTGRES_DB:=llamastack}
          user: ${env.POSTGRES_USER:=llamastack}
          password: ${env.POSTGRES_PASSWORD:=llamastack}
      stores:
        metadata:
          namespace: registry
          backend: kv_default
        inference:
          table_name: inference_store
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
        conversations:
          table_name: openai_conversations
          backend: sql_default
        prompts:
          namespace: prompts
          backend: kv_default
        connectors:
          namespace: connectors
          backend: kv_default
    registered_resources:
      models:
      - metadata: {}
        model_id: ${env.INFERENCE_MODEL}
        provider_id: vllm-inference
        model_type: llm
      - metadata: {}
        model_id: orchestrator-8b
        provider_id: vllm-orchestrator
        model_type: llm
      - metadata:
          embedding_dimension: 768
        model_id: ${env.EMBEDDING_MODEL:=nomic-ai/nomic-embed-text-v1.5}
        provider_id: sentence-transformers
        model_type: embedding
      shields:
      - shield_id: llama-guard
        provider_id: ${env.SAFETY_MODEL:+llama-guard}
        provider_shield_id: ${env.SAFETY_MODEL:=}
      vector_dbs: []
      datasets: []
      scoring_fns: []
      benchmarks: []
      tool_groups:
      - toolgroup_id: builtin::websearch
        provider_id: tavily-search
      - toolgroup_id: builtin::rag
        provider_id: rag-runtime
    server:
      port: 8321
    vector_stores:
      default_provider_id: faiss
      default_embedding_model:
        provider_id: sentence-transformers
        model_id: nomic-ai/nomic-embed-text-v1.5
