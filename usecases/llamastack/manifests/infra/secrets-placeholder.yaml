# WARNING: These are placeholder secrets with empty values.
# You MUST populate them on the cluster before syncing the LlamaStack instance.
#
# Option 1 (manual):
#   oc create secret generic postgres-secret -n llamastack --from-literal=password='<YOUR_PASSWORD>'
#   oc create secret generic llama-stack-secret -n llamastack \
#     --from-literal=INFERENCE_MODEL='<MODEL_ID>' \
#     --from-literal=VLLM_URL='<VLLM_ENDPOINT>' \
#     --from-literal=VLLM_TLS_VERIFY='false' \
#     --from-literal=VLLM_API_TOKEN='<TOKEN>' \
#     --from-literal=VLLM_MAX_TOKENS='4096'
#   oc create secret generic gemini-secret -n llamastack --from-literal=api_key='<GEMINI_API_KEY>'
#
# Option 2: Use SealedSecrets or ExternalSecrets operator.
#
# ArgoCD will NOT overwrite existing secrets that differ from these templates
# when using ServerSideApply.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  password: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: llama-stack-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  INFERENCE_MODEL: ""
  VLLM_URL: ""
  VLLM_TLS_VERIFY: ""
  VLLM_API_TOKEN: ""
  VLLM_MAX_TOKENS: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: gemini-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  api_key: ""
