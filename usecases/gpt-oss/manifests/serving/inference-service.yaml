apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gpt-oss-120b
  labels:
    app.kubernetes.io/name: gpt-oss-120b
    app.kubernetes.io/component: inference-service
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    opendatahub.io/model-type: generative
    openshift.io/display-name: GPT-OSS-120B
    openshift.io/description: "OpenAI GPT-OSS 120B MoE open-weight model (117B params, 5.1B active per token)"
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    minReplicas: 1
    maxReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      runtime: gpt-oss-120b
      storageUri: "pvc://gpt-oss-model-weights/gpt-oss-120b"
      args:
        - --dtype=auto
        - --max-model-len=16384
        - --gpu-memory-utilization=0.92
        - --tensor-parallel-size=2
        - --enable-auto-tool-choice
        - --tool-call-parser=pythonic
        - --trust-remote-code
      resources:
        requests:
          cpu: "4"
          memory: "48Gi"
          nvidia.com/gpu: "2"
        limits:
          cpu: "12"
          memory: "96Gi"
          nvidia.com/gpu: "2"
    nodeSelector:
      gpu-type: l40s
