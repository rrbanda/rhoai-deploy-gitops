apiVersion: batch/v1
kind: Job
metadata:
  name: download-gpt-oss-120b
  labels:
    app.kubernetes.io/name: download-gpt-oss-120b
    app.kubernetes.io/component: model-download
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: download-gpt-oss-120b
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - bash
            - -c
            - |
              if [ -f /mnt/models/gpt-oss-120b/.download_complete ]; then
                echo "Model already downloaded, skipping."
                exit 0
              fi
              pip install -q huggingface_hub
              python -c "
              from huggingface_hub import snapshot_download
              snapshot_download(
                  repo_id='openai/gpt-oss-120b',
                  local_dir='/mnt/models/gpt-oss-120b',
                  local_dir_use_symlinks=False,
              )
              " && touch /mnt/models/gpt-oss-120b/.download_complete
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: model-weights
              mountPath: /mnt/models
      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: gpt-oss-model-weights
