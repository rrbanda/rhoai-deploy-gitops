apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: gpt-oss-120b
  labels:
    app.kubernetes.io/name: gpt-oss-120b
    app.kubernetes.io/component: inference-service
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    opendatahub.io/model-type: generative
    openshift.io/display-name: GPT-OSS-120B
    openshift.io/description: "OpenAI GPT-OSS 120B MoE (MXFP4 quantized, Red Hat AI validated)"
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      runtime: gpt-oss-120b
      storageUri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-120b:1.5
      args:
        - --dtype=auto
        - --max-model-len=16384
        - --gpu-memory-utilization=0.95
        - --enforce-eager
        - --trust-remote-code
      resources:
        requests:
          cpu: "2"
          memory: "24Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "48Gi"
          nvidia.com/gpu: "1"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
