apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen-math-7b
  labels:
    app.kubernetes.io/name: qwen-math-7b
    app.kubernetes.io/component: serving-runtime
  annotations:
    opendatahub.io/template-name: vllm-cuda-runtime-template
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
          name: http
