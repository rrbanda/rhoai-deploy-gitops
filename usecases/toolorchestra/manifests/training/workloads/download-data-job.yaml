apiVersion: batch/v1
kind: Job
metadata:
  name: download-training-data
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: download-training-data
    app.kubernetes.io/component: training
    app.kubernetes.io/part-of: orchestrator-rhoai
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: download-training-data
        app.kubernetes.io/component: training
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: download
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - bash
            - -ec
            - |
              pip install -q huggingface_hub datasets
              python3 << 'PYEOF'
              import os, json
              marker = '/checkpoints/data/.download_complete'
              if os.path.exists(marker):
                  print('Training data already downloaded. Skipping.')
                  exit(0)
              os.makedirs('/checkpoints/data', exist_ok=True)
              print('Downloading nvidia/ToolScale dataset...')
              from datasets import load_dataset
              ds = load_dataset('nvidia/ToolScale', split='train')
              out = '/checkpoints/data/data.jsonl'
              with open(out, 'w') as f:
                  for row in ds:
                      f.write(json.dumps(row) + '\n')
              open(marker, 'w').write('ok')
              print(f'Saved {len(ds)} examples to {out}')
              PYEOF
              ls -lh /checkpoints/data/
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: training-checkpoints
