apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-32b
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: qwen3-32b
    app.kubernetes.io/component: inference-service
    app.kubernetes.io/part-of: orchestrator-rhoai
spec:
  predictor:
    model:
      modelFormat:
        name: vllm
      runtime: qwen3-32b
      storageUri: "oci://placeholder"
      args:
        - --dtype=half
        - --max-model-len=16384
        - --gpu-memory-utilization=0.90
      resources:
        requests:
          cpu: "1"
          memory: "6Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "48Gi"
          nvidia.com/gpu: "1"
    minReplicas: 1
    maxReplicas: 1
