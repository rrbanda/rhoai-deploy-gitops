apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-32b
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: qwen3-32b
    app.kubernetes.io/component: serving-runtime
    app.kubernetes.io/part-of: orchestrator-rhoai
  annotations:
    opendatahub.io/template-name: vllm-cuda-runtime-template
spec:
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      ports:
        - containerPort: 8080
          protocol: TCP
          name: http
