apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen-math-7b
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: qwen-math-7b
    app.kubernetes.io/component: inference-service
    app.kubernetes.io/part-of: orchestrator-rhoai
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    opendatahub.io/model-type: generative
    openshift.io/display-name: Qwen2.5-Math-7B-Instruct
    openshift.io/description: "Qwen2.5-Math-7B math specialist for ToolOrchestra"
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      runtime: qwen-math-7b
      storageUri: "pvc://qwen-model-weights/Qwen2.5-Math-7B-Instruct"
      args:
        - --dtype=auto
        - --max-model-len=4096
        - --gpu-memory-utilization=0.90
      resources:
        requests:
          cpu: "1"
          memory: "8Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "24Gi"
          nvidia.com/gpu: "1"
