apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: orchestrator-8b
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: orchestrator-8b
    app.kubernetes.io/component: inference-service
    app.kubernetes.io/part-of: orchestrator-rhoai
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    opendatahub.io/model-type: generative
    openshift.io/display-name: Nemotron-Orchestrator-8B
    openshift.io/description: "NVIDIA ToolOrchestra 8B orchestrator model for multi-tool coordination"
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      runtime: orchestrator-8b
      storageUri: "pvc://model-weights/Nemotron-Orchestrator-8B"
      args:
        - --dtype=auto
        - --max-model-len=16384
        - --gpu-memory-utilization=0.92
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
      resources:
        requests:
          cpu: "1"
          memory: "8Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: "24Gi"
          nvidia.com/gpu: "1"
