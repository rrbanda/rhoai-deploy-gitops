apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-default
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: orchestrator-default
    app.kubernetes.io/component: network
    app.kubernetes.io/part-of: orchestrator-rhoai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orchestrator-rhoai
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
  egress:
    - {}
