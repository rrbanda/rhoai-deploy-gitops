apiVersion: v1
kind: ConfigMap
metadata:
  name: model-mapping
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: model-mapping
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: orchestrator-rhoai
  annotations:
    description: >-
      Maps ToolOrchestra tool model names (from the paper's tools.json) to
      actual endpoints. tier1-minimal profile: tier-1 uses Gemini Flash via
      LlamaStack (cloud), tier-2/3 use local Orchestrator-8B, math tiers
      use local Qwen-Math-7B. All local endpoints are InferenceServices in
      the orchestrator-rhoai namespace.
data:
  mapping.json: |
    {
      "reasoner-1": {
        "model": "gemini/models/gemini-2.5-flash",
        "endpoint": "https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1",
        "role": "Strong reasoning (Gemini 2.5 Flash, cloud via LlamaStack)"
      },
      "reasoner-2": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Moderate reasoning (Nemotron-Orchestrator-8B, local GPU)"
      },
      "reasoner-3": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Context-based reasoning (Nemotron-Orchestrator-8B, local GPU)"
      },
      "answer-1": {
        "model": "gemini/models/gemini-2.5-flash",
        "endpoint": "https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1",
        "role": "Strongest general-purpose answer (Gemini 2.5 Flash, cloud via LlamaStack)"
      },
      "answer-2": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Good all-rounder (Nemotron-Orchestrator-8B, local GPU)"
      },
      "answer-3": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Cost-effective answer (Nemotron-Orchestrator-8B, local GPU)"
      },
      "answer-4": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Fast cheap answer (Nemotron-Orchestrator-8B, local GPU)"
      },
      "answer-math-1": {
        "model": "qwen-math-7b",
        "endpoint": "http://qwen-math-7b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Math specialist (Qwen2.5-Math-7B, local GPU)"
      },
      "answer-math-2": {
        "model": "qwen-math-7b",
        "endpoint": "http://qwen-math-7b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Math specialist (Qwen2.5-Math-7B, local GPU)"
      },
      "search-1": {
        "model": "gemini/models/gemini-2.0-flash",
        "endpoint": "https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1",
        "role": "Thorough query generation (Gemini 2.0 Flash, cloud via LlamaStack)"
      },
      "search-2": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Context-aware query generation (Nemotron-Orchestrator-8B, local GPU)"
      },
      "search-3": {
        "model": "orchestrator-8b",
        "endpoint": "http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1",
        "role": "Fast query generation (Nemotron-Orchestrator-8B, local GPU)"
      }
    }
